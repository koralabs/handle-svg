name: handle-svg
on:
    push:
        branches:
            - master
    workflow_dispatch:
permissions:
    contents: read
    id-token: write # OIDC trusted publishing to npm (no NPM_TOKEN)
jobs:
    deploy:
        name: Deploying from ${{ github.ref_name }}
        environment: mainnet
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  registry-url: https://registry.npmjs.org
                  scope: '@koralabs'

            - name: Install deps
              run: npm install --no-audit --no-fund

            - name: Lint
              run: npm run lint

            - name: Test
              run: npm test

            - name: Build
              run: npm run build

            # Only publish when package.json's version isn't already on npm, so commits that don't
            # bump the version (CI/test/doc changes) don't fail the run trying to republish.
            - name: Check version
              id: ver
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  if npm view "@koralabs/handle-svg@${VERSION}" version >/dev/null 2>&1; then
                      echo "publish=false" >> "$GITHUB_OUTPUT"
                      echo "Version ${VERSION} already published — skipping publish."
                  else
                      echo "publish=true" >> "$GITHUB_OUTPUT"
                      echo "Version ${VERSION} is new — will publish."
                  fi

            # OIDC trusted publishing (provenance) — no NPM_TOKEN. tsc emits to lib/; publish from
            # there with package.json + README copied in (main=index.js -> lib/index.js).
            - name: Publish to npm
              if: steps.ver.outputs.publish == 'true'
              run: cp package.json README.md ./lib/ && cd ./lib && npm publish --provenance --access public
